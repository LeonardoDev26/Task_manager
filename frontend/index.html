<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Task Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h1>Task Manager</h1>

        <!-- FORMULARIO -->
        <div class="form">
            <input id="title" type="text" placeholder="Título">
            <input id="description" type="text" placeholder="Descripción">
            <input id="date" type="text" placeholder="Fecha">

            <button class="add-btn" onclick="addTask()">
                Agregar tarea
            </button>
        </div>

        <!-- LISTA -->
        <ul id="task-list" class="task-list"></ul>
    </div>

    <script src="app.js"></script>
</body>
</html>
